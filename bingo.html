<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo — Festa de Santa Rita 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #04112B;
      color: #ffffff;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Cabeçalho com logo + título */
    .cabecalho {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .cabecalho img {
      height: 90px;
      width: auto;
      filter: drop-shadow(0 0 12px rgba(255,215,0,0.4));
    }

    .cabecalho-texto {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    h1 {
      font-size: 2.8rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #FFD700;
      text-shadow: 0 0 30px rgba(255,215,0,0.5);
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }

    /* Layout principal: largura total */
    .layout {
      width: 100%;
      max-width: 1200px;
    }

    /* ── COLUNA BINGO (largura total) ── */
    .col-bingo {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .bingo-header {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      margin-bottom: 7px;
    }

    .bingo-header .letra {
      background: #FFD700;
      color: #04112B;
      font-size: 2.2rem;
      font-weight: 900;
      text-align: center;
      padding: 12px 0;
      border-radius: 10px;
      letter-spacing: 2px;
      box-shadow: 0 4px 18px rgba(255,215,0,0.35);
    }

    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(15, 1fr);
      grid-auto-flow: column;
      gap: 7px;
    }

    .numero {
      background: #102A6A;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      font-size: 2.6rem;
      font-weight: 900;
      text-align: center;
      padding: 11px 4px;
      cursor: pointer;
      user-select: none;
      transition: background 0.18s, color 0.18s, border-color 0.18s, transform 0.1s, box-shadow 0.18s;
      color: #ffffff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    .numero:hover {
      background: #1A3A7A;
      border-color: rgba(255,215,0,0.5);
      transform: scale(1.06);
    }

    .numero.marcado {
      background: #FFD700;
      color: #04112B;
      border-color: #FFD700;
      box-shadow: 0 0 18px rgba(255,215,0,0.55);
      transform: scale(1.04);
    }

    /* ── COLUNA DIREITA ── */
    .col-santa {
      width: 160px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .santa-img {
      width: 100%;
      max-width: 150px;
      border-radius: 12px;
      border: 2px solid rgba(255,215,0,0.35);
      box-shadow: 0 0 24px rgba(255,215,0,0.15);
      object-fit: contain;
    }

    /* Último número — abaixo da tabela */
    .ultimo-numero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
      margin-top: 16px;
      padding: 16px 0 8px;
      border-top: 1px solid rgba(255,215,0,0.2);
    }

    .ultimo-label {
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .ultimo-valor {
      font-size: 20rem;
      font-weight: 900;
      color: #FFD700;
      text-shadow: 0 0 40px rgba(255,215,0,0.7), 0 0 80px rgba(255,215,0,0.3);
      line-height: 1;
      letter-spacing: -4px;
      transition: transform 0.15s, opacity 0.15s;
      min-height: 80px;
      display: flex;
      align-items: center;
    }

    .ultimo-valor.animar {
      transform: scale(1.2);
      opacity: 0.7;
    }

    .ultimo-letra {
      font-size: 1.6rem;
      font-weight: 700;
      color: rgba(255,215,0,0.6);
      letter-spacing: 6px;
    }

    /* Rodapé */
    .rodape {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .btn-reset {
      padding: 12px 44px;
      background: transparent;
      border: 2px solid #FFD700;
      color: #FFD700;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-reset:hover {
      background: #FFD700;
      color: #04112B;
    }

    .contador {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
    }
    .contador span {
      color: #FFD700;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- Cabeçalho: logo + título -->
  <div class="cabecalho">
    <img src="imagens/logo.png" alt="Santa Rita de Cássia">
    <div class="cabecalho-texto">
      <h1>✦ Bingo ✦</h1>
      <div class="subtitle">Festa de Santa Rita de Cássia 2026</div>
    </div>
  </div>

  <div class="layout">

    <!-- Tabela de bingo — largura total -->
    <div class="col-bingo">
      <div class="bingo-header">
        <div class="letra">B</div>
        <div class="letra">I</div>
        <div class="letra">N</div>
        <div class="letra">G</div>
        <div class="letra">O</div>
      </div>
      <div class="bingo-grid" id="grid"></div>
    </div>

  </div>

  <!-- Último número cantado — abaixo da tabela -->
  <div class="ultimo-numero">
    <div class="ultimo-label">Último número cantado</div>
    <div class="ultimo-valor" id="ultimoValor">—</div>
    <div class="ultimo-letra" id="ultimoLetra"></div>
  </div>

  <!-- Botão reset + contador — parte final -->
  <div class="rodape">
    <button class="btn-reset" onclick="resetar()">↺ &nbsp; Resetar</button>
    <div class="contador">Marcados: <span id="cont">0</span> de 75</div>
  </div>

  <script>
    const grid       = document.getElementById('grid');
    const cont       = document.getElementById('cont');
    const ultimoValor = document.getElementById('ultimoValor');
    const ultimoLetra = document.getElementById('ultimoLetra');

    const letras = { B: [1,15], I: [16,30], N: [31,45], G: [46,60], O: [61,75] };

    function letraDo(n) {
      for (const [l, [min, max]] of Object.entries(letras)) {
        if (n >= min && n <= max) return l;
      }
      return '';
    }

    function animar() {
      ultimoValor.classList.add('animar');
      setTimeout(() => ultimoValor.classList.remove('animar'), 200);
    }

    // Gera os 75 números
    for (let n = 1; n <= 75; n++) {
      const div = document.createElement('div');
      div.className = 'numero';
      div.textContent = n;
      div.addEventListener('click', () => {
        const marcando = !div.classList.contains('marcado');
        div.classList.toggle('marcado');
        if (marcando) {
          ultimoValor.textContent = n;
          ultimoLetra.textContent = letraDo(n);
          animar();
        }
        atualizarContador();
      });
      grid.appendChild(div);
    }

    function atualizarContador() {
      cont.textContent = document.querySelectorAll('.numero.marcado').length;
    }

    function resetar() {
      document.querySelectorAll('.numero.marcado').forEach(el => el.classList.remove('marcado'));
      cont.textContent = 0;
      ultimoValor.textContent = '—';
      ultimoLetra.textContent = '';
    }
  </script>

</body>
</html>
